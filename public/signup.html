<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#43e97b,#38f9d7);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
width:340px;
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#43e97b;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1fd865;
}

a{
display:block;
margin-top:10px;
text-decoration:none;
color:#43e97b;
}

</style>
</head>

<body>

<div class="container">

<h2>Create Account</h2>

<input type="text" id="name" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<input type="password" id="cpassword" placeholder="Confirm Password">

<button onclick="sendData()">Signup</button>

<a href="login.html">Already have an account?</a>

</div>
<script src="script.js"></script>
</body>
</html>
